# Turtle's Cheat Sheet for the EVE Online 'Static Data Export'
#
# Each file in the Static Data Export is a mapping of the file's datatype to it's ID
# Field names with a trailing question mark `?` indicate an optional/nullable field that may not be present
#
# This cheat sheet is derived from code comments (https://github.com/SentientTurtle/EVE-3rd-party-dev-tools), and is structured accordingly.
# There will be more redundancy than conventional documentation. Some of the data structure is opinionated.
# Only the structure and types are validated automatically, the docs may be incomplete, shallowly researched, or outdated.
#
# This file is *NOT* valid YAML. Do not attempt to parse it, your parser will explode.
# If you have a good reason why it should become YAML-compliant or have an alternate notation for something, feel free to get in touch or open an issue in the repo above.

# This file *may* be used as "context" for AI tools. Beware that it is a large file. I am not responsible if you delete your own wallet.
            

# Common Data Types #


# Position of an object on the New Eden cluster map, units in metres.
# 
# See <https://developers.eveonline.com/docs/guides/map-data/> for detailed explanation
MapPosition:
    # +X, East/Right
    x: number
    # +Y, Up
    y: number
    # +Z, North/Forward
    z: number


# Position of an object within a [`SolarSystem`], units in metres.
# 
# See <https://developers.eveonline.com/docs/guides/map-data/> for detailed explanation
CelestialPosition:
    # +X, West/Left
    x: number
    # +Y, Up
    y: number
    # +Z, North/Forward
    z: number


# 2D-map position of an object, units in metres.
# 
# Up/down, Left/right directions depend on context, see <https://developers.eveonline.com/docs/guides/map-data/> for detailed explanation
Position2D:
    # +X, East/Right
    x: number
    # +Y, North/Up
    y: number


# String with multiple language variants
# 
# English is always available. Usually, all other languages are also available
LocalizedString:
    # English
    en: string
    # German
    de?: string
    # Spanish
    es?: string
    # French
    fr?: string
    # Japanese
    ja?: string
    # Korean
    ko?: string
    # Russian
    ru?: string
    # Chinese
    zh?: string


## SDE File: agentsInSpace.jsonl agentsInSpace.yaml

# Agent (Mission NPC) that is located in space, rather than docked in a station
# 
# Additional Agent information is contained in [`NpcCharacter`] data
AgentInSpace:
    # CharacterID for this agent
    !!key agentID: CharacterID (integer)
    # 'Dungeon' within which the agent is located
    # 
    # Data about dungeons is not available for EVE 3rd party developers
    dungeonID: DungeonID (integer)
    # SolarSystem in which the Agent is located
    solarSystemID: SolarSystemID (integer)
    # Spawnpoint for agent, no data available for EVE 3rd party developers
    spawnPointID: SpawnPointID (integer)
    # TypeID of the agent's ship (Note: Agent Ships are not the same as the player-flyable ships, and have different TypeIDs)
    typeID: TypeID (integer)


